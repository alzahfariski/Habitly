name: habitly
description: "Habitly App"
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  cloud_firestore: ^6.1.2

  cupertino_icons: ^1.0.8
  firebase_auth: ^6.1.4
  firebase_core: ^4.4.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.2.1
  intl: ^0.20.2
  shared_preferences: ^2.5.4
  uuid: ^4.2.1

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/logo/
    - assets/images/
    - assets/icons/
